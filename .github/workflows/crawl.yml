name: crawl-grants

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install crawler dependencies
        run: python -m pip install -r requirements.txt

      - name: Run crawler
        run: python scripts/crawler.py --live

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/grants.json data/updates.json
          git diff --staged --quiet || git commit -m "data: refresh grants $(date +'%Y-%m-%d')"
          git push

      - name: Trigger Cloudflare deploy hook
        if: ${{ secrets.CF_DEPLOY_HOOK_URL != '' }}
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK_URL }}"
